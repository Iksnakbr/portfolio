<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Ikhsan Akbar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   

    <style>
       body {
    margin: 0;
    padding: 20px; /* Ditambah padding agar tidak mentok kiri-kanan di HP */
    min-height: 100vh;
    background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden; /* Mencegah scroll menyamping */
    color: white;
    text-align: center; /* Memastikan teks di tengah */
}

        #preloader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #ffffff;
            border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Animasi Utility */
        .fade-in { opacity: 0; animation: fadeIn 2s ease-in-out forwards; }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .tracking-in-expand {
            animation: tracking-in-expand 2s cubic-bezier(0.215, 0.610, 0.355, 1.000) both;
        }
        @keyframes tracking-in-expand {
            0% { letter-spacing: -0.5em; opacity: 0; }
            100% { opacity: 1; }
        }

        /* Delay */
        .delay-1 { animation-delay: 1.5s; }
        .delay-2 { animation-delay: 3s; }
        .delay-3 { animation-delay: 4.5s; }

        a:hover { opacity: 0.7; transition: 0.3s; cursor: pointer; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <h3 class="tracking-in-expand delay-1 font-poppins">Hi, I am</h3>
    <h2 class="fade-in delay-2 font-poppins" style="margin-top: 0;">Muhammad Ikhsan Akbar</h2>
    
    <div style="text-align: center; height: 30px;" class="fade-in delay-3">
        <span id="typing-text" style="font-size: 16px; border-right: 2px solid #ffffff; padding-right: 2px; white-space: nowrap;"></span>
    </div>

    <p style="margin-top: 15vh;" class="fade-in delay-3">About Me | Journey | Experience</p>

    <div style="text-align: center; margin-top: 10px;" class="fade-in delay-3">
        <a href="https://www.instagram.com/iksnakbr" target="_blank" style="text-decoration: none; color: white;"><i class="fa-brands fa-instagram" style="font-size: 30px; margin: 0 10px;"></i></a>
        <a href="https://discordapp.com/users/1386319360590876695" target="_blank" style="text-decoration: none; color: white;"><i class="fa-brands fa-discord" style="font-size: 30px; margin: 0 10px;"></i></a>
        <a href="https://github.com/Iksnakbr" target="_blank" style="text-decoration: none; color: white;"><i class="fa-brands fa-github" style="font-size: 30px; margin: 0 10px;"></i></a>
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=gadotcr444@gmail.com" target="_blank" style="text-decoration: none; color: white;"><i class="fa-solid fa-envelope" style="font-size: 30px; margin: 0 10px;"></i></a>
    </div>
             
   <script>
    const kataKata = ["Information Technology Student", "Web Developer", "Prompt Engineer"];
    let indeksKata = 0, indeksHuruf = 0, sedangMenghapus = false;
    
    function efekKetik() {
        let kataSaatIni = kataKata[indeksKata];
        
        if (sedangMenghapus) {
            document.getElementById("typing-text").innerHTML = kataSaatIni.substring(0, indeksHuruf - 1);
            indeksHuruf--;
        } else {
            document.getElementById("typing-text").innerHTML = kataSaatIni.substring(0, indeksHuruf + 1);
            indeksHuruf++;
        }
        
        // ATUR KECEPATAN DI SINI
        // Semakin besar angkanya, semakin lambat
        let kecepatan = sedangMenghapus ? 50 :  100; 
        
        if (!sedangMenghapus && indeksHuruf === kataSaatIni.length) {
            kecepatan = 2000; // Jeda 3 detik setelah kata selesai diketik
            sedangMenghapus = true;
        } else if (sedangMenghapus && indeksHuruf === 0) {
            sedangMenghapus = false;
            indeksKata = (indeksKata + 1) % kataKata.length;
            kecepatan = 500; // Jeda sebelum mulai kata baru
        }
        setTimeout(efekKetik, kecepatan);
    }

    // Hanya gunakan SATU listener agar tidak konflik
    window.addEventListener('load', function() {
        setTimeout(function() {
            document.getElementById('preloader').style.opacity = '0';
            document.getElementById('preloader').style.visibility = 'hidden';
            
            // Jeda 1 detik sebelum animasi ngetik pertama kali dimulai
            setTimeout(efekKetik, 1000);
        }, 2000); 
    });
      @media screen and (max-width: 600px) {
    h1 {
        font-size: 22px !important; /* Dikecilkan lagi supaya muat dalam satu baris */
        line-height: 1.2;
        padding: 0 10px !important;
        width: 90%;                 /* Membatasi lebar teks agar tidak menabrak pinggir */
        word-wrap: break-word;      /* Memaksa kata pecah jika terlalu panjang */
        margin: 0 auto !important;  /* Memastikan teks tetap di tengah */
    }
    
    #typing-text {
        font-size: 14px !important;
        white-space: normal !important; /* Mengizinkan teks mengetik turun ke baris baru jika kepanjangan */
        display: block;
        padding: 0 10px;
    }

    p {
        font-size: 13px !important;
        margin-top: 5vh !important;
    }
}
</script>
</body>
</html>
