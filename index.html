<style>
        .typewriter {
            white-space: nowrap;
            overflow: hidden;
            display: inline-block; /* Mengikuti panjang teks */
            border-right: 2px solid #00ffff; /* Kursor ketik warna aqua */
            
            /* Jalankan animasi: ketik (3.5 detik) dan kursor berkedip (selamanya) */
            animation: 
                ketik 3.5s steps(30) forwards,
                kedipKursor 0.75s step-end infinite;
        }

        /* Rumus 1: Menggerakkan lebar teks dari 0 sampai kebuka semua */
        @keyframes ketik {
            from { width: 0; }
            to { width: 100%; }
        }

        /* Rumus 2: Membuat kursor garis vertikal berkedip */
        @keyframes kedipKursor {
            from, to { border-color: transparent; }
            50% { border-color: #00ffff; }
        }



            /* Gaya untuk layar latar belakang loading */
#preloader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background-color: #000000; /* Menyesuaikan tema hitam web kamu */
  z-index: 9999; /* Memastikan loading berada di lapisan paling depan */
  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity 0.5s ease, visibility 0.5s ease;
}

/* Gaya untuk lingkaran berputar (Spinner) */
.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid rgba(255, 255, 255, 0.1); /* Garis samar */
  border-top: 5px solid #ffffff; /* Garis putih tegas yang berputar */
  border-radius: 50%;
  animation: spin 3s linear infinite;
}

/* Animasi putar */
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
#bg-video {
    position: fixed;   
    top: 0;
    left: 0;
    width: 100%;   
    height: 100vh;  
    z-index: -1;       
    object-fit: cover; 
    opacity: 0.3;      
}
</style>

    <script>
        // Tulis daftar kata yang ingin kamu tampilkan secara bergantian di sini
        const kataKata = [
            "Information Technology Student",
            "Web Devloper",
            "Prompt Engineer"
        ];
        
        let indeksKata = 0;
        let indeksHuruf = 0;
        let kataSaatIni = "";
        let hurufSaatIni = "";
        let sedangMenghapus = false;
        
        function efekKetik() {
            // Jika sudah di ujung daftar, balik lagi ke kata pertama
            if (indeksKata === kataKata.length) {
                indeksKata = 0;
            }
            
            kataSaatIni = kataKata[indeksKata];
            
            if (sedangMenghapus) {
                // Mengurangi satu huruf (efek backspace)
                hurufSaatIni = kataSaatIni.substring(0, indeksHuruf - 1);
                indeksHuruf--;
            } else {
                // Menambah satu huruf (efek mengetik)
                hurufSaatIni = kataSaatIni.substring(0, indeksHuruf + 1);
                indeksHuruf++;
            }
            
            // Memasukkan teks ke dalam HTML
            document.getElementById("typing-text").innerHTML = hurufSaatIni;
            
            // Mengatur kecepatan mengetik
            let kecepatan = 100; // Kecepatan normal mengetik
            
            if (sedangMenghapus) {
                kecepatan /= 2; // Efek menghapus dibuat lebih cepat
            }
            
            // Jika kata sudah selesai diketik sepenuhnya
            if (!sedangMenghapus && indeksHuruf === kataSaatIni.length) {
                kecepatan = 2000; // Berhenti selama 2 detik agar sempat dibaca
                sedangMenghapus = true;
            } 
            // Jika kata sudah terhapus semua hingga kosong
            else if (sedangMenghapus && indeksHuruf === 0) {
                sedangMenghapus = false;
                indeksKata++; // Ganti ke kata berikutnya di dalam daftar
                kecepatan = 500; // Jeda setengah detik sebelum mengetik kata baru
            }
            
            setTimeout(efekKetik, kecepatan);
        }
        
        // Menjalankan fungsinya pertama kali saat web dibuka
        document.addEventListener("DOMContentLoaded", efekKetik);

        
  // Menunggu sampai seluruh elemen halaman selesai dimuat (window load)
 
  window.addEventListener('load', function() {
    var loader = document.getElementById('preloader');
    
    // Kita paksa tunggu 5000 milidetik (3 detik) baru hilang
    setTimeout(function() {
      loader.style.opacity = '0';
      loader.style.visibility = 'hidden';
    }, 2000); 
  });
    </script>
