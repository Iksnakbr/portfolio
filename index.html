<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Ikhsan Akbar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   
    <style>
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            color: white;
            text-align: center;
        }
        
        .fade-in { opacity: 0; animation: fadeIn 2s ease-in-out forwards; }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        
        .tracking-in-expand { animation: tracking-in-expand 2s cubic-bezier(0.215, 0.610, 0.355, 1.000) both; }
        @keyframes tracking-in-expand { 0% { letter-spacing: -0.5em; opacity: 0; } 100% { opacity: 1; } }

        .delay-1 { animation-delay: 1.5s; } .delay-2 { animation-delay: 3s; } .delay-3 { animation-delay: 4.5s; }

        /* 🎭 STYLE TIRAI TRANSISI (OVERLAY) 🎭 */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #121214; 
            z-index: 10000;
            pointer-events: none;
            transform: translateY(-100%); 
        }

        /* Animasi Reveal saat buka pertama kali */
        body.is-loading .transition-overlay {
            animation: revealPage 0.6s cubic-bezier(0.76, 0, 0.24, 1) forwards;
        }

        /* Animasi Cover saat pindah halaman */
        .transition-overlay.is-active {
            animation: coverPage 0.6s cubic-bezier(0.76, 0, 0.24, 1) forwards !important;
        }

        @keyframes revealPage {
            0% { transform: translateY(0); }
            100% { transform: translateY(100%); }
        }

        @keyframes coverPage {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(0); }
        }

        @media screen and (max-width: 600px) {
            h1 { font-size: 26px !important; line-height: 1.2; padding: 0 10px !important; width: 90%; margin: 0 auto !important; }
            #typing-text { font-size: 14px !important; white-space: normal !important; display: block; padding: 0 10px; }
            p { font-size: 13px !important; margin-top: 5vh !important; }
        }
    </style>
</head>

<body class="is-loading">

    <div class="transition-overlay"></div>

    <h3 class="tracking-in-expand delay-1 font-poppins">Hi, I am</h3>
    <h1 class="fade-in delay-2 font-poppins" style="margin-top: 0;">Muhammad Ikhsan Akbar</h1>
    
    <div style="text-align: center; height: 60px;" class="fade-in delay-3">
        <span id="typing-text" style="font-size: 16px; border-right: 2px solid #ffffff; padding-right: 2px;"></span>
    </div>

    <p style="margin-top: 15vh;" class="fade-in delay-3">
        <a href="about.html" style="color: #ffffff; text-decoration: none;">About Me</a> | 
        <a href="journey.html" style="color: #ffffff; text-decoration: none;">Journey</a> | 
        <a href="experience.html" style="color: #ffffff; text-decoration: none;">Experience</a>
    </p>

    <div style="text-align: center; margin-top: 10px;" class="fade-in delay-3">
        <a href="https://www.instagram.com/iksnakbr" target="_blank" style="text-decoration: none; color: white;"><i class="fa-brands fa-instagram" style="font-size: 30px; margin: 0 10px;"></i></a>
        <a href="https://discordapp.com/users/1386319360590876695" target="_blank" style="text-decoration: none; color: white;"><i class="fa-brands fa-discord" style="font-size: 30px; margin: 0 10px;"></i></a>
        <a href="https://github.com/Iksnakbr" target="_blank" style="text-decoration: none; color: white;"><i class="fa-brands fa-github" style="font-size: 30px; margin: 0 10px;"></i></a>
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=gadotcr444@gmail.com" target="_blank" style="text-decoration: none; color: white;"><i class="fa-solid fa-envelope" style="font-size: 30px; margin: 0 10px;"></i></a>
    </div>
             
   <script>
    const kataKata = ["Information Technology Student", "Web Developer", "Prompt Engineer"];
    let indeksKata = 0, indeksHuruf = 0, sedangMenghapus = false;
    
    function efekKetik() {
        let kataSaatIni = kataKata[indeksKata];
        if (sedangMenghapus) {
            document.getElementById("typing-text").innerHTML = kataSaatIni.substring(0, indeksHuruf - 1);
            indeksHuruf--;
        } else {
            document.getElementById("typing-text").innerHTML = kataSaatIni.substring(0, indeksHuruf + 1);
            indeksHuruf++;
        }
        let kecepatan = sedangMenghapus ? 50 : 100; 
        if (!sedangMenghapus && indeksHuruf === kataSaatIni.length) {
            kecepatan = 2000; sedangMenghapus = true;
        } else if (sedangMenghapus && indeksHuruf === 0) {
            sedangMenghapus = false; indeksKata = (indeksKata + 1) % kataKata.length; kecepatan = 500; 
        }
        setTimeout(efekKetik, kecepatan);
    }

    window.addEventListener('load', function() {
        // Hapus class loading untuk animasi tirai reveal
        setTimeout(() => {
            document.body.classList.remove('is-loading');
        }, 600);
        
        // Langsung mulai efek ketik
        efekKetik();
    });

    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function(e) {
            if (this.hostname === window.location.hostname && this.getAttribute('href').includes('.html')) {
                e.preventDefault(); 
                const targetUrl = this.href;
                const overlay = document.querySelector('.transition-overlay');
                overlay.classList.add('is-active');
                setTimeout(() => { window.location.href = targetUrl; }, 600);
            }
        });
    });
</script>
</body>
</html>
